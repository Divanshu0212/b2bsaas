# Staging Application: auto-synced. Argo renders charts/salespipe with the in-repo staging
# overlay PLUS the CI-bumped image tag from gitops/apps. selfHeal + prune keep the cluster
# exactly at git's desired state.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: salespipe-staging
  namespace: argocd
spec:
  project: salespipe
  sources:
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      path: charts/salespipe
      helm:
        valueFiles:
          - values-staging.yaml
          # ref-based value file from the same repo (the tag CI bumps).
          - $values/gitops/apps/salespipe-staging.values.yaml
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: salespipe-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
