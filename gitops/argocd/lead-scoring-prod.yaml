# lead-scoring prod Application (manual promote).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lead-scoring-prod
  namespace: argocd
spec:
  project: salespipe
  sources:
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      path: charts/lead-scoring
      helm:
        valueFiles:
          - values-prod.yaml
          - $values/gitops/apps/lead-scoring-prod.values.yaml
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: salespipe
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
