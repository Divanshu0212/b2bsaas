# Prod Application: NO automated syncPolicy → manual promote. A human syncs after copying a
# verified staging tag into gitops/apps/salespipe-prod.values.yaml. Guards against auto-
# deploying a bad image tag (T5 risk note).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: salespipe-prod
  namespace: argocd
spec:
  project: salespipe
  sources:
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      path: charts/salespipe
      helm:
        valueFiles:
          - values-prod.yaml
          - $values/gitops/apps/salespipe-prod.values.yaml
    - repoURL: https://github.com/Divanshu0212/b2bsaas
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: salespipe
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
