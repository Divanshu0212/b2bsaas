{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lead-scoring.fullname" . }}
  labels: {{- include "lead-scoring.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "lead-scoring.selectorLabels" . | nindent 6 }}
{{- end }}
