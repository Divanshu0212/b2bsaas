{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "salespipe.fullname" . }}
  labels: {{- include "salespipe.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "salespipe.fullname" . }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUtilizationPercentage }}
    {{- if .Values.hpa.customMetric.enabled }}
    # Custom metric (T5.2) — needs a Prometheus Adapter exposing this via custom.metrics.k8s.io.
    - type: Pods
      pods:
        metric:
          name: {{ .Values.hpa.customMetric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.hpa.customMetric.targetAverageValue | quote }}
    {{- end }}
{{- end }}
