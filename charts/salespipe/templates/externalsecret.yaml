{{- if eq .Values.secret.mode "eso" }}
# T5.5: External Secrets Operator pulls material from a vault (Vault / AWS Secrets Manager)
# and syncs it into a native K8s Secret of the same name the Deployment's secretRef expects.
# No secret value is rendered from chart values in this mode.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "salespipe.fullname" . }}-secret
  labels: {{- include "salespipe.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secret.eso.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secret.eso.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: {{ include "salespipe.fullname" . }}-secret
    creationPolicy: Owner
  data:
    {{- range $envKey, $ref := .Values.secret.eso.keys }}
    - secretKey: {{ $envKey }}
      remoteRef:
        key: {{ $ref.remoteKey }}
        property: {{ $ref.property }}
    {{- end }}
{{- end }}
