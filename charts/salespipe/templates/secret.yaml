{{- if eq .Values.secret.mode "plain" }}
# Local/fallback path (T5.5): chart-rendered Secret. For real environments set
# secret.mode=eso so material is pulled from a vault and never rendered from values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "salespipe.fullname" . }}-secret
  labels: {{- include "salespipe.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
