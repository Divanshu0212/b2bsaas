apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "salespipe.fullname" . }}
  labels: {{- include "salespipe.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Zero-downtime rollout (T5.2): surge a new pod up before old ones go.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels: {{- include "salespipe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "salespipe.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when config/secret change (their content isn't in the pod spec otherwise).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if eq .Values.secret.mode "plain" }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "salespipe.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef: { name: {{ include "salespipe.fullname" . }}-config }
            - secretRef: { name: {{ include "salespipe.fullname" . }}-secret }
          startupProbe:
            httpGet: { path: {{ .Values.probes.startup.path }}, port: {{ .Values.service.targetPort }} }
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet: { path: {{ .Values.probes.liveness.path }}, port: {{ .Values.service.targetPort }} }
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet: { path: {{ .Values.probes.readiness.path }}, port: {{ .Values.service.targetPort }} }
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
