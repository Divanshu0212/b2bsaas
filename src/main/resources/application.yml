spring:
  application:
    name: salespipe
  main:
    banner-mode: off
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/salespipe}
    username: ${DB_USER:salespipe}
    password: ${DB_PASSWORD:salespipe}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 2
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-min-256-bits-long-for-hs256-xxxxxxxx}
    access-ttl-seconds: 900
    refresh-ttl-seconds: 1209600
  eventing:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    # T2.3: outbox relay mode. `cdc` (default) = Debezium reads the WAL; no app-side
    # relay bean is created at all. `polling` = fallback for environments without
    # Debezium — activates eventing/outbox/PollingRelay (@ConditionalOnProperty).
    # See application-polling.yml for a ready-made profile that flips this.
    relay-mode: ${OUTBOX_RELAY_MODE:cdc}
    polling:
      fixed-delay-ms: ${OUTBOX_POLL_DELAY_MS:3000}
  tracking:
    # T2.6: app-wide HMAC secret for email tracking_sig (see TrackingSigner javadoc for
    # why this is app-wide rather than per-org — the organizations table has no secret
    # column). Configured the same way app.jwt.secret is.
    secret: ${EMAIL_TRACKING_SECRET:dev-tracking-secret-change-me-min-256-bits-xxxxxxxx}
    # Bucket4j per-org budget on the pixel/click/webhook endpoints (overview §6.1).
    rate-limit-capacity: ${EMAIL_TRACKING_RATE_LIMIT_CAPACITY:30}
    rate-limit-refill-per-minute: ${EMAIL_TRACKING_RATE_LIMIT_REFILL:30}
  scoring:
    # T3.4: base URL of the Python lead-scoring service. Sync/manual scoring calls and
    # async recompute both go through ScoringClient, wrapped in the resilience4j
    # circuit-breaker/timelimiter/bulkhead below; on failure the app falls back to the
    # last-known score so the UI never blocks on ML latency (overview change #9).
    base-url: ${SCORING_SERVICE_URL:http://localhost:8000}
    # Recompute mode: `immediate` (recompute per feature-update event, low volume) or
    # `batched` (a @Scheduled sweep every N ms, high volume). Both implemented (T3.4).
    recompute-mode: ${SCORING_RECOMPUTE_MODE:immediate}
    recompute-batch-delay-ms: ${SCORING_RECOMPUTE_BATCH_DELAY_MS:60000}
    # A lead crossing this score triggers a "hot lead" notification (T3.5).
    hot-lead-threshold: ${SCORING_HOT_LEAD_THRESHOLD:0.75}

resilience4j:
  retry:
    instances:
      # T2.4: shared retry instance for every IdempotentConsumer subclass (see
      # IdempotentConsumer.RETRY_INSTANCE_NAME). Exponential backoff per overview §6.3
      # ("Retry + exponential backoff on Kafka consume before DLQ"); after max-attempts
      # is exhausted the caller (IdempotentConsumer) routes the message to <topic>.DLQ.
      idempotentConsumer:
        max-attempts: ${EVENTING_RETRY_MAX_ATTEMPTS:3}
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # Never abandon a redelivery attempt for a transient dedupe-table contention
        # blip either — retry on any exception; only true "poison message" handler
        # failures should exhaust attempts and go to the DLQ.
        retry-exceptions:
          - java.lang.Exception
  circuitbreaker:
    instances:
      # T3.4: circuit breaker around the ML scoring call. Opens after a burst of
      # failures/slow calls so a down ML service stops being hammered; while open,
      # ScoringClient returns its last-known-score fallback (overview §6.3).
      scoringService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      # No unbounded wait on the ML call (overview §6.3 "Timeouts on every outbound HTTP call").
      scoringService:
        timeout-duration: 2s
        cancel-running-future: true
  bulkhead:
    instances:
      # Isolate the ML-call concurrency from the DB-call pool (overview §6.3 bulkhead).
      scoringService:
        max-concurrent-calls: 16
        max-wait-duration: 100ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,retries,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
