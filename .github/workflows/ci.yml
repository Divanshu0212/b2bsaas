# T5.4 GitOps CI: build + test both services, publish SHA-tagged images to GHCR, then bump
# the image tag in gitops/ so Argo CD reconciles staging. Prod is a manual Argo promote.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository }}/salespipe
  ML_IMAGE: ghcr.io/${{ github.repository }}/lead-scoring

jobs:
  # ---- Secret scan (T5 verification: no committed secrets) ----
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # ---- Java: unit + Testcontainers integration + coverage gate ----
  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21", cache: gradle }
      # `check` runs test + jacocoTestCoverageVerification (T4.8 coverage floor).
      - run: ./gradlew --no-daemon check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/

  # ---- Python ML: pytest (contract, evaluate, features, leakage, promote) ----
  ml-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ml } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: ml/requirements.txt }
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q

  # ---- Build + push both images, tagged with the git SHA (immutable, GitOps-pinnable) ----
  build-push:
    needs: [secret-scan, java-test, ml-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build + push ML
        uses: docker/build-push-action@v6
        with:
          context: ./ml
          file: ./ml/Dockerfile
          push: true
          tags: ${{ env.ML_IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Bump the staging image tag in gitops/. Argo watches that path and auto-syncs. ----
  # Declarative desired state committed to git — NOT `kubectl apply`/`helm upgrade` from CI.
  bump-gitops:
    needs: build-push
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - name: Pin staging image tags to this SHA
        env:
          TAG: ${{ needs.build-push.outputs.sha_tag }}
        run: |
          sed -i "s|^  tag:.*|  tag: ${TAG}|" gitops/apps/salespipe-staging.values.yaml
          sed -i "s|^  tag:.*|  tag: ${TAG}|" gitops/apps/lead-scoring-staging.values.yaml
      - name: Commit the tag bump
        run: |
          git config user.name divanshu0212
          git config user.email divanshu0212@gmail.com
          git add gitops/apps/*.values.yaml
          git commit -m "chore(gitops): bump staging images to ${{ needs.build-push.outputs.sha_tag }}" || echo "no change"
          git push
