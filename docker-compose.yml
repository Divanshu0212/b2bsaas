services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salespipe
      POSTGRES_USER: salespipe
      POSTGRES_PASSWORD: salespipe
    ports: ["5432:5432"]
    # T2.3: Debezium's Postgres CDC connector (pgoutput plugin) needs logical
    # replication enabled — was left commented by T2.1 for this task to enable.
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salespipe"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  # Kafka in KRaft mode (no ZooKeeper) — combined broker+controller, single node,
  # for local dev. confluentinc image chosen (over bitnami) so the version line
  # matches cp-schema-registry below and Debezium Connect's confluentinc-based
  # image in T2.3.
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["29092:29092"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 15

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15

  # T2.3: Kafka Connect with the Debezium Postgres connector plugin preinstalled
  # (debezium/connect image, same confluentinc-lineage version line as kafka/
  # schema-registry above). Runs the outbox-event-router SMT against outbox_events —
  # register debezium/outbox-connector.json against its REST API once healthy (see
  # debezium/README.md runbook); not auto-registered by compose itself, since Connect's
  # REST API is the documented way to do it and keeps this file declarative-only.
  debezium:
    image: debezium/connect:2.7
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: salespipe-debezium
      CONFIG_STORAGE_TOPIC: _debezium_connect_configs
      OFFSET_STORAGE_TOPIC: _debezium_connect_offsets
      STATUS_STORAGE_TOPIC: _debezium_connect_status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports: ["8083:8083"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Phase 3 (T3.6): MLflow tracking + model registry. Local filesystem backend is the
  # CORE-acceptable local fallback (S3/MinIO artifact store is STRETCH). The training
  # CronJob logs+promotes here; the scoring service loads the Production model from it.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: >-
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns --artifacts-destination /mlruns
    volumes: ["mlflow-data:/mlruns"]
    ports: ["5000:5000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  # Phase 3 (T3.2): Python FastAPI lead-scoring service. Loads the Production model from
  # MLflow at startup; degrades to a heuristic fallback if none is registered yet, so the
  # cold-start demo works before the first training run.
  lead-scoring:
    build: ./ml
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: leadscore
      MLFLOW_MODEL_STAGE: Production
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/salespipe
      DB_USER: salespipe
      DB_PASSWORD: salespipe
      REDIS_HOST: redis
      JWT_SECRET: compose-secret-min-256-bits-long-for-hs256-xxxxxxxxxxxxxxx
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCORING_SERVICE_URL: http://lead-scoring:8000
      # T4.2: export traces (OTLP/gRPC) to Tempo. OutboxRecorder/EventPublisher/
      # IdempotentConsumer carry the trace across the async Kafka boundary via traceparent.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      # T6.3: browser origin for the frontend + allow the refresh cookie over http locally
      # (no TLS in compose). cookie-secure MUST stay true in any real deployment.
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      APP_AUTH_COOKIE_SECURE: "false"
    ports: ["8080:8080"]

  # T6.12: Next.js frontend. Talks to the backend via its own /api/* rewrite (BACKEND_ORIGIN),
  # so the browser stays same-origin. Host port 3001 (3000 is taken by Grafana).
  frontend:
    build: ./frontend
    depends_on:
      app:
        condition: service_started
    environment:
      BACKEND_ORIGIN: http://app:8080
    ports: ["3001:3000"]

  # T4.1: Prometheus scrapes /actuator/prometheus on `app` per observability/prometheus.yml;
  # alert rules (DLQ depth, consumer lag, CB open, error-rate SLO burn) live in
  # observability/alerts.yml, mounted in alongside so rule_files' relative path resolves.
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # T4.1: Grafana, provisioned (not click-ops) — datasource + dashboard providers under
  # observability/grafana/provisioning point at the Prometheus service above and the
  # checked-in dashboard JSON respectively.
  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/salespipe-dashboard.json:/etc/grafana/provisioning/dashboards/json/salespipe-dashboard.json:ro
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # T4.2: Grafana Tempo — OTLP trace backend. Receives spans from `app` on 4317 (gRPC),
  # queried by Grafana via the Tempo datasource (observability/grafana/provisioning).
  # Single-binary local config in observability/tempo.yml (filesystem storage).
  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports: ["3200:3200", "4317:4317"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # T4.3 (STRETCH): Loki log aggregation. Promtail ships the app's JSON stdout here;
  # Grafana's Loki datasource (observability/grafana/provisioning) derives a trace_id
  # link into Tempo, closing the log<->trace correlation loop.
  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports: ["3100:3100"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  promtail:
    image: grafana/promtail:3.2.0
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  mlflow-data:
  tempo-data:
  loki-data:
