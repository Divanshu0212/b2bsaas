# T4.3 (STRETCH): Loki log aggregation + Promtail shipper. Promtail runs as a DaemonSet
# tailing container logs on each node; Loki stores them (emptyDir here — demo-grade).
# Grafana's Loki datasource (observability-configmap.yaml) derives trace_id -> Tempo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: salespipe
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: salespipe
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: ['__meta_kubernetes_namespace']
            regex: salespipe
            action: keep
          - source_labels: ['__meta_kubernetes_pod_label_app']
            target_label: app
          - source_labels: ['__meta_kubernetes_pod_name']
            target_label: pod
        pipeline_stages:
          - json:
              expressions:
                org_id: org_id
                trace_id: trace_id
                level: level
          - labels:
              org_id:
              level:
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: salespipe
spec:
  selector: { app: loki }
  ports: [{ port: 3100, targetPort: 3100 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: salespipe
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata: { labels: { app: loki } }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.0
          args: ["-config.file=/etc/loki/loki.yml"]
          ports: [{ containerPort: 3100 }]
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /loki }
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            periodSeconds: 10
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: salespipe
spec:
  selector: { matchLabels: { app: promtail } }
  template:
    metadata: { labels: { app: promtail } }
    spec:
      containers:
        - name: promtail
          image: grafana/promtail:3.2.0
          args: ["-config.file=/etc/promtail/promtail.yml"]
          volumeMounts:
            - { name: config, mountPath: /etc/promtail }
            - { name: varlog, mountPath: /var/log, readOnly: true }
      volumes:
        - name: config
          configMap: { name: promtail-config }
        - name: varlog
          hostPath: { path: /var/log }
