# T4.2: Grafana Tempo trace backend. App exports OTLP/gRPC to tempo:4317; Grafana's
# Tempo datasource (observability-configmap.yaml) queries tempo:3200. Local filesystem
# storage via an emptyDir — traces are ephemeral, which is fine for the demo cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: salespipe
data:
  tempo.yml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    ingester:
      max_block_duration: 5m
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: salespipe
spec:
  selector: { app: tempo }
  ports:
    - { name: http, port: 3200, targetPort: 3200 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: salespipe
spec:
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata: { labels: { app: tempo } }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.0
          args: ["-config.file=/etc/tempo/tempo.yml"]
          ports:
            - { containerPort: 3200 }
            - { containerPort: 4317 }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data, mountPath: /var/tempo }
          readinessProbe:
            httpGet: { path: /ready, port: 3200 }
            periodSeconds: 10
      volumes:
        - name: config
          configMap: { name: tempo-config }
        - name: data
          emptyDir: {}
