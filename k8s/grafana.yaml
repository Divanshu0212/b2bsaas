apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: salespipe
spec:
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: salespipe
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports: [{ containerPort: 3000 }]
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: salespipe-secret, key: GRAFANA_ADMIN_PASSWORD }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboard-json, mountPath: /etc/grafana/provisioning/dashboards/json }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            periodSeconds: 15
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboard-json
          configMap: { name: grafana-dashboard-salespipe }
