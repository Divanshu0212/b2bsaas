apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-scoring
  namespace: salespipe
spec:
  replicas: 1
  selector: { matchLabels: { app: lead-scoring } }
  template:
    metadata: { labels: { app: lead-scoring } }
    spec:
      containers:
        - name: lead-scoring
          image: lead-scoring:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          env:
            - { name: MLFLOW_TRACKING_URI, value: "http://mlflow:5000" }
            - { name: MLFLOW_MODEL_NAME, value: "leadscore" }
            - { name: MLFLOW_MODEL_STAGE, value: "Production" }
          # Embedding model is memory-heavy (phase-3 "Risks/gotchas") — real limits
          # tuned in Phase 5; sane floor here.
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "2Gi" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lead-scoring
  namespace: salespipe
spec:
  selector: { app: lead-scoring }
  ports: [{ port: 8000, targetPort: 8000 }]
