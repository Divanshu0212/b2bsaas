apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-salespipe
  namespace: salespipe
data:
  salespipe-dashboard.json: |
    {
      "title": "SalesPipe",
      "uid": "salespipe-overview",
      "timezone": "utc",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request latency (p50/p95/p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] }
        },
        {
          "id": 2,
          "title": "Consumer lag by group",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "salespipe_consumer_lag",
              "legendFormat": "{{group}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        },
        {
          "id": 3,
          "title": "DLQ depth by topic",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "salespipe_dlq_depth",
              "legendFormat": "{{topic}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        },
        {
          "id": 4,
          "title": "ML scoring call latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(resilience4j_timelimiter_calls_seconds_bucket{name=\"scoringService\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] }
        },
        {
          "id": 5,
          "title": "Circuit breaker state",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "resilience4j_circuitbreaker_state",
              "legendFormat": "{{name}} - {{state}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        },
        {
          "id": 6,
          "title": "Hikari connection pool",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "hikaricp_connections_active",
              "legendFormat": "active",
              "refId": "A"
            },
            {
              "expr": "hikaricp_connections_idle",
              "legendFormat": "idle",
              "refId": "B"
            },
            {
              "expr": "hikaricp_connections_pending",
              "legendFormat": "pending",
              "refId": "C"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        }
      ]
    }
