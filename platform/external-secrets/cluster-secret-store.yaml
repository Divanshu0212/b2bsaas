# T5.5: ClusterSecretStore — how ESO reaches the vault. Referenced by the chart's
# ExternalSecret (secret.eso.secretStoreRef=vault-backend). This manifest holds NO secret
# material — only the address + auth mount. The Vault token itself lives in a bootstrap
# secret provisioned out-of-band (never committed).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.salespipe.example.com:8200
      path: secret            # KV v2 mount
      version: v2
      auth:
        # Kubernetes auth: ESO's ServiceAccount token is exchanged for a Vault token.
        kubernetes:
          mountPath: kubernetes
          role: salespipe
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
