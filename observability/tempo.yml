# T4.2: Grafana Tempo single-binary local config. Receives OTLP/gRPC spans from the app
# on :4317 and serves the query API on :3200 (Grafana's Tempo datasource points here).
# Filesystem storage — local dev only; a real deployment would use object storage.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
