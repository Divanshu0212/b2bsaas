# T4.3 (STRETCH): Promtail scrapes Docker container stdout, parses the app's JSON log
# lines, and ships them to Loki labeled by org_id/app so a trace_id search in Grafana
# jumps straight to the matching logs.
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name -> `container` label; keep only the salespipe app container.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '.*app.*'
        action: keep
    pipeline_stages:
      # App logs are JSON (LogstashEncoder). Extract correlation fields for labels/search.
      - json:
          expressions:
            org_id: org_id
            trace_id: trace_id
            level: level
            message: message
      - labels:
          org_id:
          level:
      - static_labels:
          app: salespipe
